<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<script>
			// Synchronous pre-paint theme resolution (Ingle, DECISIONS.md §3) --
			// avoids a flash of the wrong theme before hydration. Three-way
			// System/Dark/Light persisted to localStorage under "hearth.theme";
			// "system" (or no stored value) leaves data-theme unset so the
			// prefers-color-scheme media queries in app.css take over.
			(function () {
				try {
					var stored = localStorage.getItem('hearth.theme');
					if (stored === 'dark' || stored === 'light') {
						document.documentElement.setAttribute('data-theme', stored);
					}
				} catch (e) {
					/* localStorage unavailable (private mode etc.) -- fall back to system */
				}
			})();
		</script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
