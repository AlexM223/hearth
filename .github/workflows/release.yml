name: Release image

# Multi-arch build + push to GHCR, on a version tag push (v0.1.0, v0.1.1,
# ...).
#
# Each platform builds NATIVELY on its own runner (ubuntu-latest for amd64,
# GitHub's free-for-public-repos ubuntu-24.04-arm for arm64) and pushes by
# digest; a merge job then stitches both digests into the one tagged
# manifest list. The first release attempt built arm64 under QEMU in a
# single job and sat in emulation for 70+ minutes without finishing -- the
# split-native pattern finishes in minutes and removes QEMU entirely.
#
# After a run, verify both platforms landed in the manifest list with:
#   docker buildx imagetools inspect ghcr.io/alexm223/hearth:<version>
# and update packaging/umbrel/hearth/docker-compose.yml's image digest
# with the real one reported there.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  # Hardcoded lowercase, not ${{ github.repository_owner }}: Docker repository
  # names must be lowercase and the GitHub login is "AlexM223" -- buildx
  # rejects the uppercase tag outright ("repository name must be lowercase").
  IMAGE_NAME: alexm223/hearth

jobs:
  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Belt-and-suspenders: the Dockerfile's own build stage already fails
      # on any native .node addon in the pruned production tree (the
      # no-native-deps guard), but re-run the same check against the
      # checked-out source here too so a CI-only bypass of the Docker
      # build can never slip a native addon through.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: No-native-deps guard
        run: npm run check:native

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest (${{ matrix.platform }})
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          provenance: false
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge-and-smoke:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout (for the smoke-test script)
        uses: actions/checkout@v4

      - name: Derive version from tag
        id: version
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create the tagged manifest list from both digests
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            -t "${REGISTRY}/${IMAGE_NAME}:${{ steps.version.outputs.version }}" \
            $(printf "${REGISTRY}/${IMAGE_NAME}@sha256:%s " *)

      - name: Print the pushed manifest-list digest
        run: |
          docker buildx imagetools inspect "${REGISTRY}/${IMAGE_NAME}:${{ steps.version.outputs.version }}"
          digest=$(docker buildx imagetools inspect "${REGISTRY}/${IMAGE_NAME}:${{ steps.version.outputs.version }}" --format '{{json .Manifest}}' | jq -r .digest)
          echo "Full ref: ${REGISTRY}/${IMAGE_NAME}:${{ steps.version.outputs.version }}@${digest}"
          echo "::notice::Update packaging/umbrel/hearth/docker-compose.yml and packaging/store-repo/hearth-app-store/ingle-hearth/docker-compose.yml's image: line with the digest above."

      # Boot-smoke the just-pushed amd64 image on the runner itself (a real
      # pull, not the local build cache) before calling the release good.
      # arm64 booted natively during its own build job's runner? No -- it is
      # build-verified there; a full arm64 boot smoke can be added to the
      # arm64 build job later if it ever proves necessary.
      - name: Pull pushed image and run the boot smoke test
        run: |
          docker pull "${REGISTRY}/${IMAGE_NAME}:${{ steps.version.outputs.version }}"
          node scripts/smoke-test-image.mjs "${REGISTRY}/${IMAGE_NAME}:${{ steps.version.outputs.version }}"
